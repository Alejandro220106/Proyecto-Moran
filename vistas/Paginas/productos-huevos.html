<!DOCTYPE html>
<!--
  Listado de productos de HUEVOS (vista del cliente). Es la pantalla a la
  que se llega al tocar "MOSTRAR" en la categoría Huevos del catálogo.

  Estructura: un hero con foto + la banda verde "PRODUCTOS FRESCOS DE ALTA
  CALIDAD", y debajo la lista de presentaciones de huevo (por cantidad),
  cada una con su botón ORDENAR. Todo sobre el fondo de madera café.

  Página del sitio (no standalone): usa header/footer compartidos
  (#encabezado / #pie-pagina + plantillas.js). Servir con servidor local.

  Las cantidades (30/15/6/4) son las del diseño; en producción vendrán de
  la base de datos, igual que las fotos de cada presentación.
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huevos | La Morán</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../Recursos/estilos.css">
    <!-- Estilos compartidos por los dos listados (huevos y pollo). -->
    <link rel="stylesheet" href="../Recursos/productos-listado.css">
</head>
<body>

    <!-- Header compartido. -->
    <div id="encabezado"></div>

    <!-- Contenido sobre fondo de madera café. -->
    <main class="pagina-productos">

        <!-- Hero: foto de portada + banda verde con el lema de calidad. -->
        <section class="hero-productos">
            <div class="imagen-hero">
                <span class="marcador-foto">Foto de portada (huevos)</span>
            </div>
            <div class="banda-calidad">PRODUCTOS FRESCOS DE ALTA CALIDAD</div>
        </section>

        <!-- Llamado a la acción. -->
        <h1 class="titulo-pedidos">HAZ TUS PEDIDOS / ENCARGOS AQUÍ</h1>

        <!-- Lista de presentaciones de huevo. -->
        <div class="lista-productos">

            <!-- Cada tarjeta se repetirá desde la base de datos a futuro. -->
            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Huevos</h2>
                    <p class="detalle-producto">Cantidad: 30</p>
                    <p class="detalle-producto">Color: cafés</p>
                </div>
                <a href="detalle-pedido.html" class="btn boton-ordenar">ORDENAR</a>
            </article>

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Huevos</h2>
                    <p class="detalle-producto">Cantidad: 15</p>
                    <p class="detalle-producto">Color: cafés</p>
                </div>
                <a href="detalle-pedido.html" class="btn boton-ordenar">ORDENAR</a>
            </article>

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Huevos</h2>
                    <p class="detalle-producto">Cantidad: 6</p>
                    <p class="detalle-producto">Color: cafés</p>
                </div>
                <a href="detalle-pedido.html" class="btn boton-ordenar">ORDENAR</a>
            </article>

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Huevos</h2>
                    <p class="detalle-producto">Cantidad: 4</p>
                    <p class="detalle-producto">Color: cafés</p>
                </div>
                <a href="detalle-pedido.html" class="btn boton-ordenar">ORDENAR</a>
            </article>

        </div>
    </main>

    <!-- Footer compartido. -->
    <div id="pie-pagina"></div>

    <script src="../Recursos/plantillas.js" defer></script>
</body>
</html>
