<!DOCTYPE html>
<!--
  Pantalla de login de "La Morán" (Eggs Unlimited).

  A diferencia de "index.php", esta vista es HTML puro (no PHP): no necesita
  conexión a base de datos ni lógica de servidor todavía, así que no pasa por
  Componentes/Head.php, Header.php ni Footer.php (ese trío arma el "chrome"
  del sitio principal -nav + footer-, y esta pantalla de acceso no lo usa,
  es una pieza visual independiente según el diseño recibido).

  Cuando el proyecto agregue la capa de conexión a base de datos, el <form>
  de más abajo recibirá su "action" hacia el script PHP correspondiente;
  por ahora se deja sin "action" a propósito.
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | La Morán</title>

  <!-- Bootstrap 5 (solo CSS): usamos su grid y utilidades para el layout.
       No se incluye el bundle de JS de Bootstrap porque esta pantalla no
       usa componentes interactivos de Bootstrap (modales, dropdowns, etc). -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Estilos propios de esta página (clases en español, ver login.css). -->
  <link rel="stylesheet" href="../Recursos/login.css">
</head>
<body>

  <!-- Contenedor de página completa: centra la tarjeta de login en pantalla. -->
  <div class="pagina-login d-flex align-items-center justify-content-center min-vh-100">

    <!-- Tarjeta principal: panel de marca (izquierda) + panel de acceso (derecha). -->
    <div class="tarjeta-login row g-0">

      <!-- Panel izquierdo: identidad de marca. -->
      <div class="panel-marca col-12 col-md-6">
        <img
          class="insignia-logo"
          src="../Recursos/Imagenes/logo_la_moran_limpio_transparente.png"
          alt="Logo La Morán">

        <!-- Mismo eslogan que ya usa el footer del sitio (Footer.php),
             solo que aquí en formato de cita como pide el diseño. -->
        <p class="eslogan-marca">"Lo mejor, con amor, siempre Morán."</p>
      </div>

      <!-- Panel derecho: formulario de acceso. -->
      <div class="panel-acceso col-12 col-md-6">

        <form class="formulario-acceso">
          <div class="mb-3">
            <label for="usuario" class="form-label">Usuario</label>
            <input
              type="text"
              class="form-control campo-usuario"
              id="usuario"
              name="usuario"
              autocomplete="username">
          </div>

          <div class="mb-3">
            <label for="contrasena" class="form-label">Contraseña</label>
            <input
              type="password"
              class="form-control campo-password"
              id="contrasena"
              name="contrasena"
              autocomplete="current-password">
          </div>

          <button type="submit" class="btn boton-ingresar w-100">
            Iniciar sesión
          </button>

          <!-- Enlaces secundarios de cuenta. -->
          <div class="enlaces-cuenta">
            <a href="#">¿Olvidaste la contraseña?</a>
            <a href="#">Registrarse</a>
          </div>

          <!-- Accesos con redes sociales. Se usan SVG en línea (sin librería
               de íconos externa) para no sumar otra dependencia además de
               Bootstrap. El color lo controla login.css vía currentColor. -->
          <div class="iconos-redes-login">
            <a href="#" class="icono-red" aria-label="Continuar con Google">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="4.2"/>
                <line x1="12" y1="2.5" x2="12" y2="9"/>
                <line x1="4.8" y1="18.5" x2="10.9" y2="14.8"/>
                <line x1="19.2" y1="18.5" x2="13.1" y2="14.8"/>
              </svg>
            </a>
            <a href="#" class="icono-red" aria-label="Continuar con Facebook">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M14.5 8.6h2V5.8h-2.3c-2 0-3.3 1.3-3.3 3.4v1.9H8.7v2.8h2.2V21h3.1v-7.1h2.1l.3-2.8h-2.4V9.4c0-.6.3-.8.9-.8Z"/>
              </svg>
            </a>
            <a href="#" class="icono-red" aria-label="Continuar con Instagram">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="4" y="4" width="16" height="16" rx="4.5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="16.6" cy="7.4" r="0.9" fill="currentColor" stroke="none"/>
              </svg>
            </a>
            <a href="#" class="icono-red" aria-label="Continuar con X">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
                <line x1="5" y1="5" x2="19" y2="19"/>
                <line x1="19" y1="5" x2="5" y2="19"/>
              </svg>
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
