<!DOCTYPE html>
<!--
  Listado de productos de POLLO (vista del cliente). Es la pantalla a la
  que se llega al tocar "MOSTRAR" en la categoría Pollo del catálogo.

  Gemelo de productos-huevos.html: misma estructura y mismos estilos
  (Recursos/productos-listado.css), solo cambian las presentaciones
  (pechuga, muslo, alas, entero) y la foto de portada.

  Página del sitio (no standalone): usa header/footer compartidos
  (#encabezado / #pie-pagina + plantillas.js). Servir con servidor local.

  Las presentaciones son las del diseño; en producción vendrán de la base
  de datos, igual que las fotos de cada corte.
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollo | La Morán</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../Recursos/estilos.css">
    <!-- Estilos compartidos por los dos listados (huevos y pollo). -->
    <link rel="stylesheet" href="../Recursos/productos-listado.css">
</head>
<body>

    <!-- Header compartido. -->
    <div id="encabezado"></div>

    <!-- Contenido sobre fondo de madera café. -->
    <main class="pagina-productos">

        <!-- Hero: foto de portada + banda verde con el lema de calidad. -->
        <section class="hero-productos">
            <div class="imagen-hero">
                <span class="marcador-foto">Foto de portada (pollo)</span>
            </div>
            <div class="banda-calidad">PRODUCTOS FRESCOS DE ALTA CALIDAD</div>
        </section>

        <!-- Llamado a la acción. -->
        <h1 class="titulo-pedidos">HAZ TUS PEDIDOS / ENCARGOS AQUÍ</h1>

        <!-- Lista de cortes de pollo. -->
        <div class="lista-productos">

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Pechuga</h2>
                    <p class="detalle-producto">Cantidad: 30</p>
                </div>
                <a href="#" class="btn boton-ordenar">ORDENAR</a>
            </article>

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Muslo</h2>
                    <p class="detalle-producto">Cantidad: 30</p>
                </div>
                <a href="#" class="btn boton-ordenar">ORDENAR</a>
            </article>

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Alas</h2>
                    <p class="detalle-producto">Cantidad: 30</p>
                </div>
                <a href="#" class="btn boton-ordenar">ORDENAR</a>
            </article>

            <article class="tarjeta-pedido">
                <div class="imagen-producto"><span class="marcador-foto">Foto</span></div>
                <div class="info-producto">
                    <h2 class="nombre-producto">Entero</h2>
                    <p class="detalle-producto">Cantidad: —</p>
                </div>
                <a href="#" class="btn boton-ordenar">ORDENAR</a>
            </article>

        </div>
    </main>

    <!-- Footer compartido. -->
    <div id="pie-pagina"></div>

    <script src="../Recursos/plantillas.js" defer></script>
</body>
</html>
