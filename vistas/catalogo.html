<!DOCTYPE html>
<!--
  Catálogo de productos (vista del cliente): las dos categorías POLLO y
  HUEVOS sobre el fondo verde oliva, cada una con su foto y un botón
  MOSTRAR que llevará al listado de esa categoría.

  Es una página del sitio (no standalone), así que usa el header y footer
  compartidos vía los contenedores #encabezado / #pie-pagina y
  Recursos/plantillas.js. Recordá servirla con un servidor local (ver
  encabezado del proyecto), no con doble clic, o el header/footer no cargan.
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros productos | La Morán</title>

    <!-- Bootstrap 5 (grid y utilidades) + estilos compartidos + estilos de esta página. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="Recursos/estilos.css">
    <link rel="stylesheet" href="Recursos/catalogo.css">
</head>
<body>

    <!-- Header compartido. -->
    <div id="encabezado"></div>

    <!-- Contenido: panel verde con las dos categorías. -->
    <main class="catalogo">
        <div class="panel-categorias row g-0">

            <!-- Categoría: POLLO -->
            <section class="categoria col-12 col-md-6">
                <!-- Marcador de imagen: acá va la foto real del producto
                     (la pasará el equipo / vendrá del Figma). -->
                <div class="imagen-producto">
                    <span class="marcador-foto">Foto de pollo</span>
                </div>
                <h2 class="nombre-producto">POLLO</h2>
                <a href="#" class="btn boton-mostrar">MOSTRAR</a>
            </section>

            <!-- Categoría: HUEVOS -->
            <section class="categoria col-12 col-md-6">
                <div class="imagen-producto">
                    <span class="marcador-foto">Foto de huevos</span>
                </div>
                <h2 class="nombre-producto">HUEVOS</h2>
                <a href="#" class="btn boton-mostrar">MOSTRAR</a>
            </section>

        </div>
    </main>

    <!-- Footer compartido. -->
    <div id="pie-pagina"></div>

    <script src="Recursos/plantillas.js" defer></script>
</body>
</html>
